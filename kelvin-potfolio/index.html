<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ─────────────────────────────────────
         FAVICON SET
         All files must be in public/ folder:
           public/favicon.ico
           public/favicon-32x32.png
           public/favicon-16x16.png
           public/apple-touch-icon.png
           public/site.webmanifest
         ───────────────────────────────────── -->
    <!-- 1. Classic ICO — browsers load this first -->
    <link rel="shortcut icon" href="/favicon.ico" />

    <!-- 2. PNG fallbacks for modern browsers -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />

    <!-- 3. Apple home-screen icon (must be in public/, not public/images/) -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- 4. Web manifest (links to all icon sizes + theme colour) -->
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Browser tab colour on mobile Chrome/Edge -->
    <meta name="theme-color" content="#06090f" />

    <!-- ─────────────────────────────────────
         PAGE METADATA
         ───────────────────────────────────── -->
    <title>Kelvin Kariuki | Full-Stack Developer & Security Enthusiast</title>
    <meta
      name="description"
      content="Portfolio of Kelvin Kariuki — BSc. IT undergraduate, Full-Stack Developer, and founder of Nivlek Solutions. Specialising in secure web apps, mobile E2EE, and cloud infrastructure."
    />
    <meta name="author" content="Kariuki Kelvin Wachira" />
    <meta name="keywords" content="Kelvin Kariuki, Full-Stack Developer, React, Node.js, Flutter, Cybersecurity, Nyeri Kenya, Nivlek Solutions, Portfolio" />

    <!-- ─────────────────────────────────────
         OPEN GRAPH — controls how the link
         looks when shared on WhatsApp,
         Twitter, LinkedIn, Facebook, etc.
         ───────────────────────────────────── -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://nivleksolutions.co.ke" />
    <meta property="og:title"       content="Kelvin Kariuki | Full-Stack Developer" />
    <meta property="og:description" content="Building secure, scalable applications — from database schema to cloud deployment. BSc. IT @ University of Embu · Founder, Nivlek Solutions ⭐⭐⭐⭐⭐" />
    <!-- Replace with a real 1200×630px screenshot of your portfolio -->
    <meta property="og:image"       content="https://nivleksolutions.co.ke/images/og-image.jpg" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name"   content="Kelvin Kariuki Portfolio" />
    <meta property="og:locale"      content="en_KE" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Kelvin Kariuki | Full-Stack Developer" />
    <meta name="twitter:description" content="Building secure, scalable full-stack applications. Specialising in Mobile Security, E2EE, and Cloud Infrastructure." />
    <meta name="twitter:image"       content="https://nivleksolutions.co.ke/images/og-image.jpg" />

    <!-- ─────────────────────────────────────
         FONTS  (single import — preconnect
         must come before the href link)
         ───────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Figtree:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <!-- ─────────────────────────────────────
         FONT AWESOME (single import only)
         ───────────────────────────────────── -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>

  <body>
    <!--
      Anti-FOUC: runs BEFORE React loads.
      Applies saved theme instantly so there's
      zero flash of light colours on page load.
    -->
    <script>
      (function () {
        var saved = localStorage.getItem('theme');
        if (saved === 'light') {
          document.body.classList.add('light-theme');
        }
        // No class needed for dark — :root variables are already dark
      })();
    </script>

    <div id="root"></div>

    <!-- ─────────────────────────────────────
         NETLIFY FORMS — static copy required
         Netlify's build scanner reads plain
         HTML; it cannot see React-rendered
         forms. This hidden copy registers
         the form in your Netlify dashboard.

         Field names MUST match Contact.jsx:
           name, email, subject, message, bot-field
           great kelvin
         ───────────────────────────────────── -->
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="text"   name="name" />
      <input type="email"  name="email" />
      <input type="text"   name="subject" />
      <textarea            name="message"></textarea>
      <input type="hidden" name="bot-field" />
    </form>

    <script type="module" src="/src/main.jsx"></script>
  </body>
  
</html>
